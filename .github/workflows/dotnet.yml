name: .NET

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

permissions:
  statuses: write
  checks: write
  contents: write
  pull-requests: write
  actions: write
  id-token: write

jobs:
  test:
    if: "!startsWith(github.ref, 'refs/tags/v')"
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Build
      run: dotnet build
    - name: Test
      run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
    - name: Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: "**/test-results.trx"
        reporter: dotnet-trx

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Get Version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      shell: bash
    - name: NuGet login (OIDC)
      uses: NuGet/login@v1
      id: login
      with:
        user: deiruch
    - name: Pack
      run: dotnet pack SATInterface/SATInterface.csproj -c Release -o out -p:Version=${{ steps.get_version.outputs.VERSION }}
    - name: Push to NuGet
      run: dotnet nuget push out/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
